        // Load favorites and stats from localStorage
        let favorites = JSON.parse(localStorage.getItem('bookmarkFavorites')) || [];
        let linkClicks = JSON.parse(localStorage.getItem('bookmarkClicks')) || {};
        let currentFilter = 'all';
        let searchQuery = '';
        
        // Initialize
        init();
        
        function init() {
            renderCategories();
            updateStats();
            setupEventListeners();
        }
        
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                filterAndRender();
            });
            
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    filterAndRender();
                });
            });
        }
        
        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            const groupedByCategory = {};
            
            bookmarksData.forEach(link => {
                if (!groupedByCategory[link.category]) {
                    groupedByCategory[link.category] = [];
                }
                groupedByCategory[link.category].push(link);
            });
            
            container.innerHTML = '';
            
            Object.keys(groupedByCategory).sort().forEach(category => {
                const links = groupedByCategory[category];
                const section = createCategorySection(category, links);
                container.appendChild(section);
            });
        }
        
        function createCategorySection(category, links) {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.dataset.category = category;
            
            section.innerHTML = `
                <div class="category-header" onclick="toggleCategory('${category}')">
                    <div>
                        <span class="category-name">${category}</span>
                        <span class="category-count">${links.length}</span>
                    </div>
                    <span class="expand-icon">▼</span>
                </div>
                <div class="links-container">
                    ${links.map(link => createLinkCard(link)).join('')}
                </div>
            `;
            
            return section;
        }
        
        function createLinkCard(link) {
            const isFavorite = favorites.includes(link.url);
            const clicks = linkClicks[link.url] || 0;
            
            return `
                <div class="link-card" data-url="${link.url}">
                    <div class="link-header">
                        <a href="${link.url}" class="link-title" target="_blank" onclick="trackClick('${link.url}')">
                            🔗 ${link.title}
                        </a>
                        <div class="link-actions">
                            <button class="link-action favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite('${link.url}', event)">⭐</button>
                        </div>
                    </div>
                    <div class="link-description">${link.description}</div>
                    <div class="link-url">${link.url}</div>
                    ${clicks > 0 ? `<div class="link-meta"><span>📊 ${clicks} Klicks</span></div>` : ''}
                </div>
            `;
        }
        
        function toggleCategory(category) {
            const section = document.querySelector(`[data-category="${category}"]`);
            section.classList.toggle('expanded');
        }
        
        function toggleFavorite(url, event) {
            event.preventDefault();
            event.stopPropagation();
            
            if (favorites.includes(url)) {
                favorites = favorites.filter(f => f !== url);
            } else {
                favorites.push(url);
            }
            
            localStorage.setItem('bookmarkFavorites', JSON.stringify(favorites));
            renderCategories();
            updateStats();
        }
        
        function trackClick(url) {
            linkClicks[url] = (linkClicks[url] || 0) + 1;
            localStorage.setItem('bookmarkClicks', JSON.stringify(linkClicks));
        }
        
        function filterAndRender() {
            let filteredLinks = bookmarksData;
            
            // Apply filter
            if (currentFilter === 'favorites') {
                filteredLinks = filteredLinks.filter(link => favorites.includes(link.url));
            }
            
            // Apply search
            if (searchQuery) {
                filteredLinks = filteredLinks.filter(link => 
                    link.title.toLowerCase().includes(searchQuery) ||
                    link.description.toLowerCase().includes(searchQuery) ||
                    link.url.toLowerCase().includes(searchQuery) ||
                    link.category.toLowerCase().includes(searchQuery)
                );
            }
            
            const container = document.getElementById('categoriesContainer');
            const noResults = document.getElementById('noResults');
            
            if (filteredLinks.length === 0) {
                container.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                container.style.display = 'block';
                noResults.style.display = 'none';
                
                // Group and render
                const groupedByCategory = {};
                filteredLinks.forEach(link => {
                    if (!groupedByCategory[link.category]) {
                        groupedByCategory[link.category] = [];
                    }
                    groupedByCategory[link.category].push(link);
                });
                
                container.innerHTML = '';
                Object.keys(groupedByCategory).sort().forEach(category => {
                    const links = groupedByCategory[category];
                    const section = createCategorySection(category, links);
                    container.appendChild(section);
                });
            }
            
            updateStats(filteredLinks.length);
        }
        
        function updateStats(visibleCount) {
            document.getElementById('totalLinks').textContent = bookmarksData.length;
            document.getElementById('totalCategories').textContent = new Set(bookmarksData.map(l => l.category)).size;
            document.getElementById('favoriteCount').textContent = favorites.length;
            document.getElementById('visibleCount').textContent = visibleCount !== undefined ? visibleCount : bookmarksData.length;
        }
        
        function expandAll() {
            document.querySelectorAll('.category-section').forEach(section => {
                section.classList.add('expanded');
            });
        }
        
        function collapseAll() {
            document.querySelectorAll('.category-section').forEach(section => {
                section.classList.remove('expanded');
            });
        }
        
        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('lightMode', document.body.classList.contains('light-mode'));
        }
        
        // Load saved theme
        if (localStorage.getItem('lightMode') === 'true') {
            document.body.classList.add('light-mode');
        }
        
        function exportBookmarks() {
            const dataStr = JSON.stringify(bookmarksData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'cs12_bookmarks_export.json';
            link.click();
        }
        
        function exportMarkdown() {
            const sorted = [...bookmarksData].sort((a, b) => (a.category + a.title).localeCompare(b.category + b.title));
            const cats = {};
            sorted.forEach(b => {
                if (!cats[b.category]) cats[b.category] = [];
                cats[b.category].push(b);
            });
            
            let md = '# 🔒 CS_12 Security Bookmarks\n\n';
            md += '**Gesamtanzahl:** ' + bookmarksData.length + ' Links | **Kategorien:** ' + Object.keys(cats).length + '\n\n---\n\n';
            md += '## 📑 Inhaltsverzeichnis\n\n';
            Object.keys(cats).sort().forEach(cat => {
                md += '- ' + cat + ' (' + cats[cat].length + ' Links)\n';
            });
            md += '\n---\n\n';
            Object.keys(cats).sort().forEach(cat => {
                md += '## ' + cat + '\n\n';
                md += '*' + cats[cat].length + ' Links*\n\n';
                md += '| Tool | Beschreibung | Link |\n';
                md += '|------|-------------|------|\n';
                cats[cat].forEach(l => {
                    md += '| **' + l.title.replace(/\|/g, '-') + '** | ' + (l.description || '').replace(/\|/g, '-') + ' | [→ Link](' + l.url + ') |\n';
                });
                md += '\n---\n\n';
            });
            
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'CS12-Security-Bookmarks.md';
            link.click();
        }
    </script>
